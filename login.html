<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header>
        <nav>

        </nav>
    </header>

    <main>
        <div class="container  position-absolute top-50 start-50 translate-middle  shadow p-3 mb-5 bg-body-tertiary rounded text-bg-light p-3 "">
            <h2 id="titulo" class="container text-center mb-4">Login</h2>
            <form id="form-login" class="container">
                
                <div id="c-email" class="conjunto">
                    <label class="mb-2" for="email">Email: </label>
                    <input class="container rounded mb-3" size="30"  type="email" id="email" placeholder="Digite seu email" required>
                </div>

                <div id="c-senha" class="conjunto">
                    <label class="mb-2" for="senha">Senha: </label>
                    <input class="container rounded mb-3" size="30" type="password" id="senha" placeholder="Digite sua senha" required>
                </div>
                <button class="container btn btn-primary" id="botao-envio" type="submit">Entrar</button>
            </form>
            <div id="mensagem"></div>
            <div class="toggle container text-center" id="toggle">
                <p>Não tem conta? <a href="#" class="link-primary">Cadastre-se!</a></p>
            </div>
        </div>
    </main>

    <footer>

    </footer>

<!-- Scripts -->

<script src="Scripts/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
